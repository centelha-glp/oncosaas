services:
  backend:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: on-failure
    ports:
      - '127.0.0.1:3002:3002'
    environment:
      NODE_ENV: production
      PORT: '3002'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must point to your managed Postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_DEFAULT_USER:-ONCONAV}:${RABBITMQ_DEFAULT_PASS:-ONCONAV_dev}@rabbitmq:5672}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL must be set}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set}
      RUN_SEED_ON_BOOT: ${RUN_SEED_ON_BOOT:-false}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://backend:3002/api/v1/health',function(r){process.exit(r.statusCode===200?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL must be set}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3002}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:3002}

  ai-service:
    image: ${ECR_REGISTRY:-oncosaas}/oncosaas-ai-service:${IMAGE_TAG:-latest}
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:8001:8001'
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:3002}
      BACKEND_SERVICE_TOKEN: ${BACKEND_SERVICE_TOKEN:?BACKEND_SERVICE_TOKEN must be set}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set}
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  backend_uploads:
